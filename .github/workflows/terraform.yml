name: Terraform CI CD

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Choose pipeline action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm_apply:
        description: "Type apply-dev or apply-prod to confirm apply"
        required: false
        type: string
      confirm_destroy:
        description: "Type destroy-dev or destroy-prod to confirm destroy"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_REPO_PATH: terraform-playbook-app-c-infra
  MODULES_REPO_PATH: terraform-playbook-modules
  TERRAFORM_VERSION: 1.7.5

jobs:
  ci_checks:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: CI Fmt and Validate (${{ matrix.env_dir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_dir: ["terraform-playbook-app-c-infra/environments/dev", "terraform-playbook-app-c-infra/environments/prod"]

    defaults:
      run:
        working-directory: ${{ matrix.env_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_REPO_PATH }}

      - name: Checkout Shared Terraform Modules
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TF_MODULES_REPOSITORY }}
          ref: ${{ vars.TF_MODULES_REF }}
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}
          path: ${{ env.MODULES_REPO_PATH }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Fmt Check
        working-directory: .
        run: terraform fmt -check -recursive .

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  pr_plan:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    name: PR Plan (${{ matrix.target_env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target_env: ["dev", "prod"]
    env:
      TF_VAR_dynatrace_api_token: ${{ secrets.DYNATRACE_API_TOKEN || '' }}
    defaults:
      run:
        working-directory: ${{ env.APP_REPO_PATH }}/environments/${{ matrix.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_REPO_PATH }}

      - name: Checkout Shared Terraform Modules
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TF_MODULES_REPOSITORY }}
          ref: ${{ vars.TF_MODULES_REF }}
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}
          path: ${{ env.MODULES_REPO_PATH }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          key            = "terraform/aws-prod-lab/${{ matrix.target_env }}/terraform.tfstate"
          region         = "${{ secrets.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init (Remote Backend)
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Plan (Remote State)
        run: terraform plan -input=false -out=tfplan

      - name: Export Plan Text
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload PR Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ matrix.target_env }}-tfplan
          path: ${{ env.APP_REPO_PATH }}/environments/${{ matrix.target_env }}/tfplan.txt

  manual_plan:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'plan'
    name: Manual Plan (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    env:
      TF_VAR_dynatrace_api_token: ${{ secrets.DYNATRACE_API_TOKEN || '' }}
    defaults:
      run:
        working-directory: ${{ env.APP_REPO_PATH }}/environments/${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_REPO_PATH }}

      - name: Checkout Shared Terraform Modules
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TF_MODULES_REPOSITORY }}
          ref: ${{ vars.TF_MODULES_REF }}
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}
          path: ${{ env.MODULES_REPO_PATH }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          key            = "terraform/aws-prod-lab/${{ inputs.target_env }}/terraform.tfstate"
          region         = "${{ secrets.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init (Remote Backend)
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Plan (Remote State)
        run: terraform plan -input=false -out=tfplan

      - name: Export Plan Text
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Manual Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual-${{ inputs.target_env }}-tfplan
          path: ${{ env.APP_REPO_PATH }}/environments/${{ inputs.target_env }}/tfplan.txt

  manual_apply:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.confirm_apply == format('apply-{0}', inputs.target_env)
    name: Manual Apply (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    env:
      TF_VAR_dynatrace_api_token: ${{ secrets.DYNATRACE_API_TOKEN || '' }}
    defaults:
      run:
        working-directory: ${{ env.APP_REPO_PATH }}/environments/${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_REPO_PATH }}

      - name: Checkout Shared Terraform Modules
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TF_MODULES_REPOSITORY }}
          ref: ${{ vars.TF_MODULES_REF }}
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}
          path: ${{ env.MODULES_REPO_PATH }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          key            = "terraform/aws-prod-lab/${{ inputs.target_env }}/terraform.tfstate"
          region         = "${{ secrets.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init (Remote Backend)
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export Applied Plan Text
        run: terraform show -no-color tfplan > applied-plan.txt

      - name: Upload Apply Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apply-${{ inputs.target_env }}-plan
          path: ${{ env.APP_REPO_PATH }}/environments/${{ inputs.target_env }}/applied-plan.txt

  manual_destroy:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.confirm_destroy == format('destroy-{0}', inputs.target_env)
    name: Manual Destroy (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    env:
      TF_VAR_dynatrace_api_token: ${{ secrets.DYNATRACE_API_TOKEN || '' }}
    defaults:
      run:
        working-directory: ${{ env.APP_REPO_PATH }}/environments/${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_REPO_PATH }}

      - name: Checkout Shared Terraform Modules
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TF_MODULES_REPOSITORY }}
          ref: ${{ vars.TF_MODULES_REF }}
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}
          path: ${{ env.MODULES_REPO_PATH }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          key            = "terraform/aws-prod-lab/${{ inputs.target_env }}/terraform.tfstate"
          region         = "${{ secrets.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init (Remote Backend)
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Destroy
        run: terraform destroy -input=false -auto-approve
